<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>反射神経ゲーム</title>
  <style>
    :root{
      --bg:#0f1220;
      --card:#1a1f35;
      --text:#f5f7ff;
      --sub:#b8bfdc;
      --accent:#6ee7ff;
      --good:#35d07f;
      --bad:#ff6b6b;
      --warn:#ffd166;
      --border:#2a3154;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{
      margin:0;padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background:linear-gradient(180deg,#0b0e19 0%, #151a2e 100%);
      color:var(--text);
      height:100%;
    }
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .app{
      width:min(100%, 460px);
      background:rgba(26,31,53,.95);
      border:1px solid var(--border);
      border-radius:24px;
      padding:18px;
      box-shadow:0 18px 40px rgba(0,0,0,.35);
    }
    .title{
      font-size:28px;
      font-weight:800;
      margin:0 0 6px;
      letter-spacing:.02em;
    }
    .subtitle{
      font-size:14px;
      color:var(--sub);
      line-height:1.5;
      margin:0 0 16px;
    }
    .panel{
      background:#11162b;
      border:1px solid var(--border);
      border-radius:20px;
      padding:14px;
      margin-bottom:14px;
    }
    .hud{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }
    .stat{
      background:#11162b;
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
    }
    .label{
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
    }
    .value{
      font-size:22px;
      font-weight:800;
    }
    .arena{
      position:relative;
      user-select:none;
      width:100%;
      aspect-ratio:1/1;
      border-radius:24px;
      border:1px solid var(--border);
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 30%, rgba(110,231,255,.12), transparent 30%),
        linear-gradient(180deg, #12172b 0%, #0d1222 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:14px;
    }
    .arena.ready{ box-shadow:inset 0 0 0 2px rgba(255,255,255,.04); }
    .arena.go{
      background:
        radial-gradient(circle at 50% 30%, rgba(53,208,127,.20), transparent 30%),
        linear-gradient(180deg, #132b1f 0%, #0d2219 100%);
    }
    .arena.fake{
      background:
        radial-gradient(circle at 50% 30%, rgba(255,209,102,.18), transparent 30%),
        linear-gradient(180deg, #302515 0%, #21170d 100%);
    }
    .arena.fail{
      background:
        radial-gradient(circle at 50% 30%, rgba(255,107,107,.20), transparent 30%),
        linear-gradient(180deg, #301717 0%, #221010 100%);
    }
    .character{
      width:120px;
      height:120px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:56px;
      margin:0 auto 14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      transition:transform .15s ease;
    }
    .go .character{ transform:scale(1.08); }
    .big{
      font-size:32px;
      font-weight:900;
      line-height:1.25;
      margin-bottom:8px;
      white-space:pre-line;
    }
    .small{
      font-size:14px;
      color:var(--sub);
      line-height:1.6;
      white-space:pre-line;
    }
    .btns{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }
    button{
      appearance:none;
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }
    .primary{
      background:var(--accent);
      color:#09111f;
    }
    .secondary{
      background:#252d50;
      color:var(--text);
      border:1px solid #36406d;
    }
    .footer{
      margin-top:14px;
      font-size:12px;
      color:var(--sub);
      line-height:1.6;
    }
    .badge{
      display:inline-block;
      font-size:11px;
      font-weight:800;
      padding:5px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      color:var(--sub);
      margin-bottom:10px;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">反射神経ゲーム</h1>
    <p class="subtitle">1回勝負。<br>「タップ！」が出たらすぐ押す。<br>でもフェイントが来たら押したら負け。</p>

    <section class="hud">
      <div class="stat">
        <div class="label">結果</div>
        <div class="value" id="resultValue">-</div>
      </div>
      <div class="stat">
        <div class="label">反応時間</div>
        <div class="value" id="timeValue">-</div>
      </div>
    </section>

    <section id="arena" class="arena ready" aria-label="ゲームエリア">
      <div>
        <div class="badge" id="phaseBadge">待機中</div>
        <div class="character" id="character">🙂</div>
        <div class="big" id="mainText">スタートで開始</div>
        <div class="small" id="subText">画面をよく見てね</div>
      </div>
    </section>

    <div class="btns">
      <button class="primary" id="startBtn">スタート</button>
      <button class="secondary" id="resetBtn">リセット</button>
    </div>

    <div class="footer">
      コツ：<br>
      ・「集中！」はフェイントのことあり<br>
      ・「タップ！」が出た時だけ押す<br>
      ・1ゲームごとに自動終了
    </div>
  </main>

  <script>
    const arena = document.getElementById('arena');
    const phaseBadge = document.getElementById('phaseBadge');
    const character = document.getElementById('character');
    const mainText = document.getElementById('mainText');
    const subText = document.getElementById('subText');
    const resultValue = document.getElementById('resultValue');
    const timeValue = document.getElementById('timeValue');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    let state = 'idle'; // idle, waiting, fake, go, ended
    let timeoutId = null;
    let goTime = 0;
    let fakeRound = false;

    function clearTimer(){
      if(timeoutId){
        clearTimeout(timeoutId);
        timeoutId = null;
      }
    }

    function setArenaClass(name){
      arena.className = 'arena ' + name;
    }

    function resetUI(){
      clearTimer();
      state = 'idle';
      fakeRound = false;
      goTime = 0;
      phaseBadge.textContent = '待機中';
      character.textContent = '🙂';
      mainText.textContent = 'スタートで開始';
      subText.textContent = '画面をよく見てね';
      resultValue.textContent = '-';
      timeValue.textContent = '-';
      setArenaClass('ready');
      startBtn.disabled = false;
      startBtn.textContent = 'スタート';
    }

    function endGame(result, msText, face, arenaClass, title, detail){
      state = 'ended';
      phaseBadge.textContent = result;
      character.textContent = face;
      mainText.textContent = title;
      subText.textContent = detail;
      resultValue.textContent = result;
      timeValue.textContent = msText || '-';
      setArenaClass(arenaClass);
      startBtn.disabled = false;
      startBtn.textContent = 'もう1回';
    }

    function startGame(){
      clearTimer();
      state = 'waiting';
      startBtn.disabled = true;
      phaseBadge.textContent = '準備中';
      character.textContent = '😐';
      mainText.textContent = '待って…';
      subText.textContent = '「タップ！」が出るまで押さない';
      resultValue.textContent = '-';
      timeValue.textContent = '-';
      setArenaClass('ready');

      const delay = 1800 + Math.random() * 2200;
      fakeRound = Math.random() < 0.4; // 40%でフェイント

      timeoutId = setTimeout(() => {
        if(fakeRound){
          state = 'fake';
          phaseBadge.textContent = 'フェイント';
          character.textContent = '😏';
          mainText.textContent = '集中！';
          subText.textContent = 'まだ押しちゃダメ';
          setArenaClass('fake');

          timeoutId = setTimeout(() => {
            state = 'go';
            goTime = performance.now();
            phaseBadge.textContent = '本番';
            character.textContent = '😲';
            mainText.textContent = 'タップ！';
            subText.textContent = '今だ！';
            setArenaClass('go');
          }, 1000 + Math.random() * 900);
        } else {
          state = 'go';
          goTime = performance.now();
          phaseBadge.textContent = '本番';
          character.textContent = '😲';
          mainText.textContent = 'タップ！';
          subText.textContent = '今だ！';
          setArenaClass('go');
        }
      }, delay);
    }

    function handleTap(){
      if(state === 'idle') return;

      if(state === 'waiting'){
        clearTimer();
        endGame('失敗', '-', '🙈', 'fail', '早すぎ！', 'まだ合図が出ていなかった');
        return;
      }

      if(state === 'fake'){
        clearTimer();
        endGame('失敗', '-', '🤦', 'fail', 'フェイントに引っかかった！', '「タップ！」じゃない時に押した');
        return;
      }

      if(state === 'go'){
        const reaction = Math.round(performance.now() - goTime);
        let rank = 'すごい！';
        if(reaction > 350) rank = 'まずまず！';
        if(reaction > 500) rank = 'がんばった！';
        if(reaction < 220) rank = '神反応！';
        endGame('成功', reaction + ' ms', '🎉', 'go', rank, '1回勝負クリア');
      }
    }

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', resetUI);
    arena.addEventListener('click', handleTap);
    arena.addEventListener('touchstart', function(e){
      e.preventDefault();
      handleTap();
    }, {passive:false});

    resetUI();
  </script>
</body>
</html>
